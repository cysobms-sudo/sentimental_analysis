name: Deploy to Hugging Face Spaces 🚀

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://cysobms:$HF_TOKEN@huggingface.co/spaces/cysobms/sentimental-analysis
          git push hf main --force
         
